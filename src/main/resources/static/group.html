<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Group Details - Expense Splitter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/styles.css?v=5">
</head>
<body>
<header class="site-header">
    <div class="shell header-content">
        <a class="brand" href="/" aria-label="Expense Splitter home">
            <span class="brand-mark">ES</span>
            <span class="brand-name">Expense Splitter</span>
        </a>
        <a class="back-link" href="/">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            <span>Back to Groups</span>
        </a>
    </div>
</header>

<main class="shell group-page">
    <section class="panel group-page-panel" aria-labelledby="groupTitle">
        <div class="group-page-heading">
            <div>
                <div class="panel-title">
                    <span class="title-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24"><path d="M4 13V5a2 2 0 0 1 2-2h6l2 3h4a2 2 0 0 1 2 2v5"/><path d="M7 13v5a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-5"/><path d="M3 13h18"/></svg>
                    </span>
                    <h1 id="groupTitle">Group Details</h1>
                </div>
                <p id="groupDescription" class="panel-subtitle">Loading group details...</p>
            </div>
        </div>

        <div class="group-details-layout">
            <form id="memberForm" class="create-form member-form">
                <label for="memberName">Member Name <span>*</span></label>
                <div class="member-form-row">
                    <div class="field">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
                        <input id="memberName" name="memberName" type="text" required maxlength="120" placeholder="e.g. Maria" autocomplete="off" disabled>
                    </div>
                    <button id="addMemberBtn" class="primary-button" type="submit" disabled>
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                        <span>Add Member</span>
                    </button>
                </div>
                <p id="memberMessage" class="form-message" role="status"></p>
            </form>

            <div class="members-panel" aria-labelledby="membersTitle">
                <h2 id="membersTitle">Members</h2>
                <div id="membersEmpty" class="members-empty">No members added to this group yet.</div>
                <ul id="membersList" class="members-list" aria-live="polite"></ul>
            </div>
        </div>
    </section>
</main>

<script src="/js/group.js?v=5"></script>
</body>
</html>
